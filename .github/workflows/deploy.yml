name: Test and Deploy to GitHub Pages
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: site
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.160.1'
          extended: true
      - name: Build site
        run: hugo
        working-directory: ./darktheme
      - name: Check if index.html exists
        run: test -f ./darktheme/public/index.html
      - name: Check for broken links
        run: |
          grep -r 'href=' ./darktheme/public/index.html | grep -v 'http' | grep -v '#'
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: ./darktheme/public

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: ./public
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./darktheme/public
